<div class="login-container">
  <h2>Connexion E.M.E.S</h2>
  
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Votre adresse email">
      </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" formControlName="password" placeholder="Mot de passe">
      </div>

    <button type="submit" [disabled]="loginForm.invalid">Se connecter</button>
  </form>
  
  <p>Pas encore de compte ? <a routerLink="/register">S'inscrire</a></p>
</div>
