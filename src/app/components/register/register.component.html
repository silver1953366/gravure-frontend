<div class="register-container">
  <h2>Inscription Client</h2>
  
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
    
    <div class="form-group">
      <label for="name">Nom / Nom d'entreprise</label>
      <input id="name" type="text" formControlName="name" placeholder="Votre nom ou entreprise">
      <div 
        *ngIf="registerForm.get('name')?.invalid && (registerForm.get('name')?.dirty || registerForm.get('name')?.touched)" 
        class="validation-error">
        <span *ngIf="registerForm.get('name')?.errors?.['required']">Le nom est requis.</span>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Votre adresse email">
      </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" formControlName="password" placeholder="Minimum 8 caractères">
      </div>

    <div class="form-group">
      <label for="password_confirmation">Confirmer le Mot de passe</label>
      <input id="password_confirmation" type="password" formControlName="password_confirmation" placeholder="Confirmer">
      
      <div 
        *ngIf="registerForm.hasError('mismatch') && (registerForm.get('password_confirmation')?.dirty || registerForm.get('password_confirmation')?.touched)"
        class="validation-error">
        <span>Les mots de passe ne correspondent pas.</span>
      </div>
    </div>

    <button type="submit" [disabled]="registerForm.invalid">S'inscrire</button>
  </form>
  
  <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
</div>
