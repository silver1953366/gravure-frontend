<div class="client-app-shell">
    
    <div class="client-sidebar-host" [class.is-open]="isSidebarOpen">
        <div class="logo-area">YouMeet Client</div>
        <nav class="client-nav">
            <a routerLink="/client/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>
            <a routerLink="/client/orders" routerLinkActive="active" class="nav-link">Mes Commandes</a>
            </nav>
        <button (click)="toggleSidebar()" class="sidebar-toggle-mobile">Fermer Menu</button>
    </div>

    <div class="main-content-wrapper" [class.pushed]="isSidebarOpen">
        
        <header class="client-navbar-header">
            <button (click)="toggleSidebar()" class="menu-toggle-desktop">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="18" y2="18"/></svg>
            </button>
            <span class="navbar-title">Tableau de Bord Client</span>
            <div class="profile-avatar">P</div>
        </header>
        
        <main class="page-content-area">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
