<div
  *ngIf="visible"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm animate-fadeIn"
>
  <div
    class="bg-white dark:bg-gray-900 rounded-xl shadow-xl w-11/12 md:w-1/3 p-6 border border-gray-200 dark:border-gray-700"
  >
    <h2 class="text-lg font-semibold mb-4 text-gray-800 dark:text-gray-100">
      {{ title }}
    </h2>

    <div class="mb-4">
      <ng-content></ng-content>
    </div>

    <div class="flex justify-end space-x-3">
      <button
        (click)="close()"
        class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition"
      >
        {{ cancelLabel }}
      </button>
      <button
        (click)="confirmAction()"
        [disabled]="disableConfirm"
        class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition disabled:opacity-50"
      >
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
