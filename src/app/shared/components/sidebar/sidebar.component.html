<!-- Overlay de masquage (visible uniquement sur mobile quand la sidebar est ouverte) -->
<div class="sidebar-overlay" [class.is-open]="isOpen" (click)="closeSidebar.emit()"></div>

<!-- Conteneur principal de la sidebar -->
<aside class="sidebar-wrapper" [class.is-open]="isOpen">
  
  <div class="sidebar-section">
    <!-- Header (Logo et Texte) -->
    <div class="sidebar-logo-container">
      <!-- NOTE: Remplacez l'image par un chemin valide ou un SVG -->
      <img src="assets/logo.png" alt="Logo" class="sidebar-logo-img" />
      <span class="sidebar-logo-text">E.M.E.S</span>
      
      <!-- Bouton de fermeture (utile sur desktop si la sidebar est basculable, ou sur mobile) -->
      <button class="close-button" (click)="closeSidebar.emit()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav-container">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.path"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="onLinkClick()" 
      >
        <i class="fa-solid nav-icon" [ngClass]="link.icon"></i>
        <span class="nav-label">{{ link.label }}</span>
      </a>
    </nav>
  </div>

  <!-- Footer (Déconnexion) -->
  <div class="sidebar-footer-section">
    <button class="logout-button" (click)="onLogout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>Déconnexion</span>
    </button>
  </div>
</aside>
